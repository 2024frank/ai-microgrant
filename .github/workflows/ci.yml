name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --no-coverage --passWithNoTests

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Dummy values so build doesn't crash without real env vars
          NEXT_PUBLIC_FIREBASE_API_KEY: placeholder
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: placeholder
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: placeholder.appspot.com
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '000000'
          NEXT_PUBLIC_FIREBASE_APP_ID: '1:000000:web:000000'
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          DATABASE_HOST: localhost
          DATABASE_PORT: '3306'
          DATABASE_USERNAME: test
          DATABASE_PASSWORD: test
          DATABASE_NAME: test
          ANTHROPIC_API_KEY: test
          SOURCE_BUILDER_ENVIRONMENT_ID: test
          SOURCE_BUILDER_VAULT_ID: test
          FIREBASE_SERVICE_ACCOUNT: '{}'
          RESEND_API_KEY: test
          CRON_SECRET: test
