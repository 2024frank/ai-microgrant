name: Hourly Event Dispatcher

on:
  schedule:
    # Avoid the top-of-hour GitHub Actions traffic spike. The application
    # evaluates each source's own America/New_York cron expression.
    - cron: '17 * * * *'
  # Also allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      source_id:
        description: 'Specific source ID to run (leave empty to run all)'
        required: false
        default: ''

jobs:
  fetch:
    name: Run agent fetchers
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger fetch via app API
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SOURCE_ID: ${{ github.event.inputs.source_id }}
        run: |
          if [ -n "$SOURCE_ID" ]; then
            echo "Triggering fetch for source $SOURCE_ID..."
            SCHEDULE_SLOT="$(date -u +'%Y-%m-%dT%H:%M:00.000Z')"
            curl -fsS --retry 3 --retry-all-errors --connect-timeout 10 --max-time 60 -X POST \
              "$APP_URL/api/agent/trigger/$SOURCE_ID" \
              -H "x-cron-secret: $CRON_SECRET" \
              -H "x-schedule-slot: $SCHEDULE_SLOT" \
              -H "Content-Type: application/json" \
              | tee response.json
          else
            echo "Triggering fetch for all sources..."
            curl -fsS --retry 3 --retry-all-errors --connect-timeout 10 --max-time 60 -X GET \
              "$APP_URL/api/agent/schedule" \
              -H "Authorization: Bearer $CRON_SECRET" \
              | tee response.json
          fi
          echo ""
          echo "Response:"
          cat response.json

      - name: Check for errors
        run: |
          if jq -e '(.failed // 0) > 0 or ((.invalid_schedules // []) | length > 0)' response.json >/dev/null; then
            echo "One or more sources failed or have an invalid schedule — check logs above"
            exit 1
          fi
          echo "All due sources dispatched successfully"
