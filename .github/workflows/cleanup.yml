name: Daily Cleanup

on:
  schedule:
    - cron: '0 7 * * *'   # 7am UTC daily (3am Oberlin time)
  workflow_dispatch:        # manual trigger

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete past events
        env:
          APP_URL: ${{ secrets.APP_URL || secrets.NEXT_PUBLIC_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "APP_URL or NEXT_PUBLIC_APP_URL secret is required"
            exit 1
          fi
          curl -fsS -X POST "$APP_URL/api/cleanup" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Content-Type: application/json" | tee /tmp/result.json
          cat /tmp/result.json
